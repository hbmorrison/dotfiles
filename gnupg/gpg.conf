# Enable the GPG agent for key management
use-agent

# Set the default key for signing and encryption
default-key 139557138+hbmorrison@users.noreply.github.com

# Specify the keyserver for fetching keys
keyserver hkps://keys.openpgp.org

# Set the preferred cipher algorithm
cipher-algo AES256

# Specify the preferred digest algorithm
digest-algo SHA256

# Enable compression
compress-algo zip

# Specify the output to be more user-friendly
no-tty

# Enable trust on first use (TOFU)
trust-model tofu
